name: Release

on:
  push:
    tags:
      - 'v*'
    # Branch-push release path: pushing a `release/vX.Y.Z` branch cuts that
    # release. This is the trigger available to environments whose git relay
    # permits branch pushes but denies tag pushes (and denies workflow_dispatch
    # via the API) — the runner derives the version from the branch name,
    # creates and pushes the real tag with its own GITHUB_TOKEN, runs
    # goreleaser, then deletes the release branch. Branch the release point
    # (normally the default branch tip) into `release/vX.Y.Z` and push it.
    branches:
      - 'release/v*'
  # Manual dispatch does the same from a chosen ref, when the API caller has
  # actions:write. The runner creates and pushes the tag, then goreleaser runs
  # exactly as it does for a pushed tag.
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to create and publish (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # goreleaser generates the changelog from git log, which needs full
          # history, not the default shallow clone.
          fetch-depth: 0

      # Resolve the release version for every trigger — the tag name on a tag
      # push, the dispatch input, or the release/* branch suffix — and export
      # it for the tag and goreleaser steps below.
      - name: Resolve version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_VERSION:-}" ]; then
            V="$DISPATCH_VERSION"
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            V="$GITHUB_REF_NAME"
          else
            V="${GITHUB_REF_NAME#release/}"
          fi
          case "$V" in
            v[0-9]*) ;;
            *) echo "version must match ^v[0-9] (got '$V')" >&2; exit 1 ;;
          esac
          echo "VERSION=$V" >> "$GITHUB_ENV"

      # For the branch-push and workflow_dispatch paths there is no tag yet:
      # refuse to clobber an existing tag, then create and push it on the
      # checked-out commit so goreleaser sees the same tagged git state a
      # `push: tags` event would present. Tags pushed with GITHUB_TOKEN do not
      # re-trigger this workflow (GitHub's recursion guard), so there is no
      # double release. Skipped on a real tag push, where the tag exists.
      - name: Create and push tag
        if: github.ref_type != 'tag'
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "tag $VERSION already exists on origin — pick a new version" >&2
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "refs/tags/$VERSION"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # goreleaser is a go.mod tool dependency, so `go tool` resolves the
      # exact pinned version — CI and `make release-snapshot` can never
      # drift apart the way an action-managed binary could.
      #
      # Notes are auto-generated (grouped, per .goreleaser.yaml's changelog)
      # by default. The optional escape hatch: if docs/releases/<version>.md
      # exists, it overrides the generated changelog for this release — so a
      # release you want to hand-polish just needs that file committed, no
      # separate step. Absent, nothing manual is required.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          notes="docs/releases/${VERSION}.md"
          if [ -f "$notes" ]; then
            echo "Using curated release notes: $notes"
            go tool goreleaser release --clean --release-notes="$notes"
          else
            echo "No curated notes for $VERSION; using the generated changelog"
            go tool goreleaser release --clean
          fi

      # The release/* branch is a one-shot trigger, not durable state; delete
      # it once the release has published so these branches don't accumulate.
      # Best-effort — a failure here must not fail an otherwise-good release.
      - name: Delete release branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
        run: git push origin --delete "$GITHUB_REF_NAME" || true
