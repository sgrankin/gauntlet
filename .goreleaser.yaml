version: 2

project_name: gauntlet

builds:
  - id: gauntlet
    main: ./cmd/gauntlet
    binary: gauntlet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      # Only linux_amd64, linux_arm64, darwin_arm64 are published.
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

# Raw binary assets, not tarballs: the release page serves
# `gauntlet_<os>_<arch>` directly, no extraction step. Note this
# name_template carries NO version — the release (tag) that owns each
# asset is what distinguishes versions; see docs/deploy.md "Releases" and
# docs/runbooks/azure-vm-immutable.md's URL-construction comment for the
# consequence (the "v" prefix lives only in the release tag / URL path
# segment, never in the filename).
archives:
  - id: gauntlet
    ids: [gauntlet]
    formats: [binary]
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'typo'
  # The house commit style is `area: subject`, not conventional commits, so
  # the split is a light heuristic: subjects that mention a fix land under
  # Fixes, everything else under Changes. The last group has no regexp and so
  # catches the remainder. (Overridden entirely when a curated
  # docs/releases/<tag>.md is passed via --release-notes.)
  groups:
    - title: Fixes
      regexp: '(?i)\b(fix|fixes|fixed|bugfix|hotfix|revert)\b'
      order: 0
    - title: Changes
      order: 1

release:
  github:
    owner: sgrankin
    name: gauntlet
  draft: false
  prerelease: auto

# One buildx multi-platform build that pushes the multi-arch manifest
# directly — replaces the classic per-arch `dockers` blocks +
# `docker_manifests` stitching. Consequences of the switch: the per-arch
# staging tags (`:<version>-amd64`/`-arm64`) are no longer published
# (nothing referenced them except the manifests themselves), and the build
# context now lays the prebuilt binaries out per platform
# (`linux/amd64/gauntlet`, …), which Dockerfile.release selects via
# $TARGETPLATFORM. Still Dockerfile.release, NOT the top-level multi-stage
# Dockerfile — the context holds only prebuilt binaries, never source.
# Image tags carry no "v" prefix ({{ .Version }} = 1.4.0), matching what
# the classic config always published.
dockers_v2:
  - id: gauntlet
    ids: [gauntlet]
    images:
      - ghcr.io/sgrankin/gauntlet
    tags:
      - '{{ .Version }}'
      - latest
    dockerfile: Dockerfile.release
    platforms:
      - linux/amd64
      - linux/arm64
    # No SBOM/provenance attestations, for parity with the plain manifests
    # the classic pipeline pushed (attestations also render as spurious
    # "unknown/unknown" platform rows in the ghcr UI). Enable deliberately
    # if wanted, not as a side effect of this migration.
    sbom: 'false'
    flags:
      - '--provenance=false'
