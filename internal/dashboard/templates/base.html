{{define "base"}}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{if .Refresh}}<noscript><meta http-equiv="refresh" content="5"></noscript>{{end}}
<title>{{.Title}} · gauntlet</title>
<style>
:root {
  color-scheme: light dark;
  /* Page background is the soft gray, --card the white content surface —
     inverted from this pair's own names because --bg is also what
     pre.output (below) paints itself with: a captured-output block wants to
     read as recessed relative to whatever card contains it, and the one
     variable already meaning "the surface behind everything" is exactly the
     right value for that, in light mode as much as dark. */
  --bg: #f6f8fa;
  --fg: #1b1f23;
  --muted: #656d76;
  --border: #d0d7de;
  --card: #ffffff;
  --ok: #1a7f37;
  --bad: #cf222e;
  --warn: #9a6700;
  --conflict: #bc4c00;
  --error: #8250df;
  --neutral: #656d76;
  --accent: #0969da;
}
@media (prefers-color-scheme: dark) {
  :root {
    /* Unchanged by the light-mode --bg/--card inversion above: dark mode
       already had --card lighter than --bg (a card standing out by being
       brighter, not darker, than the page it sits on) — the same visual
       relationship light mode now also has, just reached from the opposite
       direction (card lighter vs. card whiter). */
    --bg: #0d1117;
    --fg: #e6edf3;
    --muted: #9198a1;
    --border: #30363d;
    --card: #161b22;
    --ok: #3fb950;
    --bad: #f85149;
    --warn: #d29922;
    --conflict: #e0812c;
    --error: #a371f7;
    --neutral: #9198a1;
    --accent: #58a6ff;
  }
}
* { box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  margin: 0;
  padding: 1.5rem;
  line-height: 1.4;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
header { margin-bottom: 1.5rem; }
header nav a { margin-right: 1rem; font-size: .9rem; }
h1 { font-size: 1.3rem; margin: .3rem 0 0; }
h2 { font-size: 1.05rem; margin: 0 0 .3rem; }
table { border-collapse: collapse; width: 100%; }
th, td { padding: .35rem .6rem; border-bottom: 1px solid var(--border); text-align: left; font-size: .88rem; vertical-align: top; }
th { color: var(--muted); font-weight: 600; }
/* .table-scroll wraps every <table> in the templates (mobile overflow
   fix): a nowrap cell (SHA, run ID, timestamp) has an unbreakable min-content
   width, so on a narrow viewport the table as a whole wants to be wider than
   its container — without this wrapper that pressure bubbles up to <body>
   and the WHOLE PAGE scrolls sideways. overflow-x:auto here catches that
   growth at the table's own box instead: the table is free to be wider than
   the wrapper, and only the wrapper's contents scroll to reveal it. This
   only works because `table` above stays width:100% (never a min-width) —
   auto table layout still respects each cell's min-content size and grows
   past 100% of a 100%-width table when a nowrap cell demands it; a table
   fighting to StAY at exactly 100% would instead be forced to shrink those
   cells, which is what used to make a starved SHA cell (mono +
   overflow-wrap:anywhere, see .nowrap's own doc below) shatter character-by-
   character instead of overflowing cleanly.
   Doubles as this pass's "tables read as being on a white surface" fix:
   border/background/radius mirror .card, so a table becomes its own content
   surface on the gray page rather than sitting flush on the body background. */
.table-scroll { overflow-x: auto; border: 1px solid var(--border); background: var(--card); border-radius: 8px; margin: .5rem 0 1rem; }
.table-scroll table { margin: 0; }
.card { border: 1px solid var(--border); background: var(--card); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; min-width: 0; overflow-wrap: anywhere; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.grid > * { min-width: 0; }
.tag { display: inline-block; padding: .05rem .5rem; border-radius: 1rem; font-size: .78rem; font-weight: 600; border: 1px solid currentColor; }
.tag.ok { color: var(--ok); }
.tag.bad { color: var(--bad); }
.tag.warn { color: var(--warn); }
.tag.neutral { color: var(--neutral); }
.muted { color: var(--muted); }
code, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .85em; overflow-wrap: anywhere; }
footer { margin-top: 2rem; }
.section { margin-bottom: 1.5rem; }
/* nowrap: run IDs (e.g. 20260705T224731Z-5-bb12231a0a65), formatted
   timestamps, and short SHAs (<code>, which is mono + overflow-wrap:anywhere
   below) all contain characters a table cell will otherwise wrap or break on
   at awkward points — applied directly to the cell or link, not to <table>
   generally, since plenty of other columns (topic, reason) should still
   wrap. Combined with .table-scroll above, this is also the mobile-overflow
   fix for SHA cells specifically: without white-space:nowrap, a starved
   narrow cell lets overflow-wrap:anywhere break the SHA one character per
   line (vertical "shattering"); nowrap forbids any break at all, which
   pushes the table past 100% width instead — exactly what .table-scroll
   exists to catch with a horizontal scrollbar rather than letting it
   shatter or bleed into the page. */
.nowrap { white-space: nowrap; }

/* --- status chips: shared between /, /t/{target} and /run/{id} ---------
   A chip is always a small solid-fill square, never text (bullet 5's
   "filled squares without text" option) — the human-readable word, when
   one is needed (e.g. a check's status in its <details> summary), sits in
   ordinary text next to it rather than inside it, so chip contrast never
   has to be separately tuned per color per color-scheme. */
.chip { display: inline-block; width: .8rem; height: .8rem; border-radius: 3px; vertical-align: text-bottom; }
.chip-ok { background: var(--ok); }
.chip-bad { background: var(--bad); }
.chip-warn { background: var(--warn); }
.chip-conflict { background: var(--conflict); }
.chip-error { background: var(--error); }
.chip-neutral { background: var(--neutral); }
/* chip-batched: a thin ring around a chip whose run landed as part of a
   batch (docs/plans/phase5.md §10 amendment 1) — enough to read the strip
   as visually grouped without a redesign; the ring color is deliberately
   neutral (not tied to outcome) so it layers over any chip-<class> fill. */
.chip-batched { box-shadow: 0 0 0 2px var(--accent); }
.chips { display: flex; flex-wrap: wrap; gap: .3rem; align-items: center; min-width: 0; }
/* .check-ratio: the compact "✓ passed/total" next to a run's outcome chip
   on target.html's Recent runs table only — index.html's bare chip strip
   never renders this (see runSummary.CheckRatio's doc: a chip there is a
   filled square, never text, by design). tabular-nums keeps the digits from
   jittering width as different rows show 1-2 vs 10+ checks. */
.check-ratio { margin-left: .3rem; font-variant-numeric: tabular-nums; }

/* --- pipeline stacked list (/t/{target}, docs/plans/phase5.md §3.4) ----- */
.pipeline-run { border-top: 1px solid var(--border); padding-top: .6rem; margin-top: .6rem; }
.pipeline-run:first-child { border-top: none; padding-top: 0; margin-top: 0; }
.pipeline-members { margin: .2rem 0 .4rem; padding-left: 1.2rem; }

/* --- per-check output (/run/{id}) --------------------------------------- */
/* .checklist is carded like .table-scroll above (gray-page/white-card pass):
   border/background/radius mirror .card, so the whole check list reads as
   one content surface rather than sitting flush on the body. This is also
   why pre.output's own var(--bg) background (below) reads as "recessed" —
   it's --bg (the page's own gray) nested inside this white --card box, the
   same relation a native inset panel has to its dialog. padding is
   horizontal only: each .check-row still owns its own vertical padding/
   border-bottom, so the card's padding here only needs to keep row content
   off the card's own left/right border. */
.checklist { margin: .5rem 0 1rem; border: 1px solid var(--border); background: var(--card); border-radius: 8px; padding: 0 .8rem; }
/* .check-row is the one shared "row" box, whichever element carries it: a
   plain <div class="check-row"> (no output) or a <details class="check-row">
   (has output, run.html) — the padding/border-bottom belongs to that outer
   box either way, so a collapsed details row measures identically to a
   plain div row, and an expanded one still puts its bottom border AFTER the
   <pre class="output"> (the details box encloses both summary and pre),
   not in between them. Giving the SAME rule to <summary> too (the previous
   shape of this CSS) doubles both the border and the padding on the details
   element, which owns them once already as its parent box — that was the
   double-border/indent bug this rule fixes. summary itself only needs its
   own display/cursor/marker treatment now, no box of its own. */
.check-row { display: block; padding: .4rem .2rem; border-bottom: 1px solid var(--border); font-size: .88rem; }
/* The last row's own border-bottom would otherwise sit right on top of
   .checklist's now-added bottom border (a thin double line) — every row
   above it still wants the separator, just not the final one. */
.checklist .check-row:last-child { border-bottom: none; }
details.check-row summary { display: block; cursor: pointer; }
details.check-row summary::marker { color: var(--muted); }
/* .check-summary-line is an inner wrapper INSIDE <summary>, not a rule on
   summary itself: setting display:flex directly on <summary> drops its
   native disclosure-triangle marker in some browsers, since the marker box
   is tied to summary's own (list-item-flavored) display rather than being a
   plain generated-content overlay. Wrapping the actual content in a child
   flex container gets the same left/right layout without touching that. */
.check-summary-line { display: flex; justify-content: space-between; align-items: baseline; gap: .6rem; }
.check-summary-name { min-width: 0; overflow-wrap: anywhere; }
.check-summary-meta { white-space: nowrap; flex: none; }
pre.output { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: .6rem; margin: .3rem 0 .6rem; overflow-x: auto; overflow-y: auto; max-height: 30em; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .8rem; white-space: pre; }
/* .check-command: the check's argv, echoed above its output (v8,
   command-echo). Sized/backgrounded like pre.output but flattened on the
   bottom edge and glued to it via the adjacent-sibling rule below, so the
   two read as one bordered box with a colored command line on top — the
   tangled pipeline-log look. The adjacent-sibling selector (rather than e.g.
   a shared wrapper div) means a check whose Command is "" (a pre-v8 row)
   renders no .check-command element at all and pre.output silently keeps
   its normal fully-rounded standalone box — no empty header bar, no dangling
   flattened corner. overflow-x:auto + white-space:pre so a long command
   scrolls in its own box exactly like pre.output does, never the page. */
.check-command { background: var(--bg); color: var(--accent); border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; margin: .3rem 0 0; padding: .5rem .6rem; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .8rem; overflow-x: auto; white-space: pre; }
.check-command + pre.output { border-top: none; border-radius: 0 0 6px 6px; margin-top: 0; }

/* --- queue-depth chart (/checks) ----------------------------------------- */
.depth-chart { background: var(--card); border: 1px solid var(--border); border-radius: 8px; max-width: 100%; height: auto; }
.depth-axis { stroke: var(--border); stroke-width: 1; }
.depth-label { fill: var(--muted); font-size: 9px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
.depth-waiting { fill: none; stroke: var(--accent); stroke-width: 2; }
.depth-inflight { fill: none; stroke: var(--ok); stroke-width: 2; }
.depth-parked { fill: none; stroke: var(--muted); stroke-width: 1.5; stroke-dasharray: 3 2; }
.legend-dot { display: inline-block; width: .7rem; height: .7rem; border-radius: 2px; margin: 0 .3rem 0 .9rem; vertical-align: middle; }
.legend-dot:first-child { margin-left: 0; }
.legend-dot.waiting { background: var(--accent); }
.legend-dot.inflight { background: var(--ok); }
.legend-dot.parked { background: var(--muted); }
</style>
</head>
<body>
<header>
<nav><a href="/">targets</a><a href="/checks">checks</a></nav>
<h1>{{.Title}}</h1>
</header>
<main>{{block "content" .}}{{end}}</main>
<footer class="muted"><small>generated {{.GeneratedAt}}{{if .Version}} · gauntlet {{.Version}}{{end}}</small></footer>
{{if .Refresh}}<script src="{{.IdiomorphURL}}"></script>{{end}}
<script>
// Every server-rendered timestamp is a <time datetime="..."> element holding
// a UTC string (dashboard/server.go's formatTime) — deliberately unchanged
// visible text, since a mixed-timezone table is more confusing than a
// consistent one. applyTimeTooltips adds a title tooltip, computed
// client-side, giving the viewer's local zone and a friendly relative age
// without touching what's actually printed. It's a named, idempotent
// function (not an inline DOMContentLoaded closure) because a .Refresh page
// needs to re-run it after every DOM morph below, not just once at load —
// idiomorph syncs attributes from the fetched HTML onto matching live
// elements, and a client-set title isn't in that fetched HTML, so it gets
// stripped on each morph if nothing puts it back.
function applyTimeTooltips() {
  var units = [
    ['year', 365 * 24 * 3600], ['month', 30 * 24 * 3600], ['day', 24 * 3600],
    ['hour', 3600], ['minute', 60], ['second', 1],
  ];
  // Built once per call, not once per <time> element (constructing an Intl
  // formatter isn't free) — and defensively: an engine without
  // Intl.RelativeTimeFormat (pre-2020 Safari/older) throws a TypeError
  // constructing it, which would otherwise take the toLocaleString() half of
  // the tooltip down with it for every remaining element. rtf stays null in
  // that case and relative() degrades to "", so the tooltip is just local
  // time with no relative line.
  var rtf = null;
  try {
    rtf = new Intl.RelativeTimeFormat(undefined, {numeric: 'auto'});
  } catch (e) {}
  function relative(d) {
    if (!rtf) return '';
    var secs = (d.getTime() - Date.now()) / 1000;
    for (var i = 0; i < units.length; i++) {
      var unit = units[i][0], secondsInUnit = units[i][1];
      if (Math.abs(secs) >= secondsInUnit || unit === 'second') {
        return rtf.format(Math.round(secs / secondsInUnit), unit);
      }
    }
    return '';
  }
  document.querySelectorAll('time[datetime]').forEach(function (el) {
    var d = new Date(el.getAttribute('datetime'));
    if (isNaN(d.getTime())) return;
    var title = d.toLocaleString();
    var rel = relative(d);
    if (rel) title += '\n' + rel;
    el.title = title;
  });
}
document.addEventListener('DOMContentLoaded', applyTimeTooltips);

{{if .Refresh}}
// Auto-refresh (DESIGN.md decision ledger): a plain <meta http-equiv=
// "refresh"> full-reloads the page every 5s, which blows away scroll
// position and any in-progress text selection, and flashes the whole page
// blank on every tick — jarring on a page that's live-updating exactly
// because someone is watching it. Instead: poll this same page's own URL,
// and morph the fetched body onto the live DOM with idiomorph (id-based
// diffing — an element carrying a stable id is patched in place rather than
// replaced), so scroll position and selection outside the regions that
// actually changed survive a tick, and there's no navigation flash. The
// <noscript> meta-refresh above is the no-JS fallback; if idiomorph itself
// failed to load (network hiccup on that one extra request), fall back to a
// real reload so the page still keeps refreshing either way.
//
// NOTE for whoever adds a <details> to a page that sets Refresh (today only
// run.html's captured-check-output rows use <details>, and that page never
// refreshes): idiomorph syncs attributes from the fetched HTML onto the live
// DOM, so a viewer-toggled `open` attribute is NOT preserved by itself — the
// server always renders these collapsed, the next morph diffs against that,
// and idiomorph's attribute sync removes `open` right back off (same
// mechanism applyTimeTooltips works around for `title`, just with nothing
// currently restoring `open`). If that ever matters, either render
// authoritative server-side open state or add an idiomorph
// beforeAttributeUpdated callback that refuses to touch `open`.
document.addEventListener('DOMContentLoaded', function () {
  // busy: sets before a fetch starts, clears in .finally() once it settles.
  // setInterval fires on a fixed 5s cadence regardless of whether the
  // previous tick's request has resolved yet; without this guard a slow
  // response (backend GC pause, a lossy link) can resolve AFTER a later,
  // faster tick's response and morph stale state onto the fresher DOM, and
  // a wedged backend piles up one concurrent fetch per missed tick. Skipping
  // the tick outright while one is outstanding avoids both.
  var busy = false;
  setInterval(function () {
    if (document.hidden || busy) return; // backgrounded tab, or previous tick still in flight
    if (!window.Idiomorph) {
      location.reload();
      return;
    }
    busy = true;
    fetch(location.href, {credentials: 'same-origin'})
      .then(function (res) { return res.ok ? res.text() : null; })
      .then(function (html) {
        if (!html) return; // non-2xx (e.g. daemon mid-restart): skip this tick, retry next
        var doc = new DOMParser().parseFromString(html, 'text/html');
        Idiomorph.morph(document.body, doc.body);
        applyTimeTooltips();
      })
      .catch(function () {}) // network error: skip this tick, retry next
      .finally(function () { busy = false; });
  }, 5000);
});
{{end}}
</script>
</body>
</html>
{{end}}
