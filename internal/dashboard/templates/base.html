{{define "base"}}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{if .Refresh}}<meta http-equiv="refresh" content="5">{{end}}
<title>{{.Title}} · gauntlet</title>
<style>
:root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #1b1f23;
  --muted: #656d76;
  --border: #d0d7de;
  --card: #f6f8fa;
  --ok: #1a7f37;
  --bad: #cf222e;
  --warn: #9a6700;
  --neutral: #656d76;
  --accent: #0969da;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d1117;
    --fg: #e6edf3;
    --muted: #9198a1;
    --border: #30363d;
    --card: #161b22;
    --ok: #3fb950;
    --bad: #f85149;
    --warn: #d29922;
    --neutral: #9198a1;
    --accent: #58a6ff;
  }
}
* { box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  margin: 0;
  padding: 1.5rem;
  line-height: 1.4;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
header { margin-bottom: 1.5rem; }
header nav a { margin-right: 1rem; font-size: .9rem; }
h1 { font-size: 1.3rem; margin: .3rem 0 0; }
h2 { font-size: 1.05rem; margin: 0 0 .3rem; }
table { border-collapse: collapse; width: 100%; margin: .5rem 0 1rem; }
th, td { padding: .35rem .6rem; border-bottom: 1px solid var(--border); text-align: left; font-size: .88rem; vertical-align: top; }
th { color: var(--muted); font-weight: 600; }
.card { border: 1px solid var(--border); background: var(--card); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.tag { display: inline-block; padding: .05rem .5rem; border-radius: 1rem; font-size: .78rem; font-weight: 600; border: 1px solid currentColor; }
.tag.ok { color: var(--ok); }
.tag.bad { color: var(--bad); }
.tag.warn { color: var(--warn); }
.tag.neutral { color: var(--neutral); }
.muted { color: var(--muted); }
code, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .85em; }
footer { margin-top: 2rem; }
.section { margin-bottom: 1.5rem; }
</style>
</head>
<body>
<header>
<nav><a href="/">targets</a><a href="/checks">checks</a></nav>
<h1>{{.Title}}</h1>
</header>
<main>{{block "content" .}}{{end}}</main>
<footer class="muted"><small>generated {{.GeneratedAt}}</small></footer>
</body>
</html>
{{end}}
